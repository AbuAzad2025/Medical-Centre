{% extends "base.html" %}

{% block title %}إضافة فحص مختبر جديد{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">
                        <i class="fas fa-plus"></i>
                        إضافة فحص مختبر جديد
                    </h3>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="name">اسم الفحص (بالإنجليزية)</label>
                                    <input type="text" class="form-control" id="name" name="name" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="name_ar">اسم الفحص (بالعربية)</label>
                                    <input type="text" class="form-control" id="name_ar" name="name_ar" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="description">الوصف</label>
                            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="category">الفئة</label>
                                    <select class="form-control" id="category" name="category" required>
                                        <option value="">اختر الفئة</option>
                                        <option value="blood">فحص الدم</option>
                                        <option value="urine">فحص البول</option>
                                        <option value="stool">فحص البراز</option>
                                        <option value="hormone">الهرمونات</option>
                                        <option value="microbiology">الميكروبيولوجيا</option>
                                        <option value="chemistry">الكيمياء</option>
                                        <option value="other">أخرى</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="price">السعر</label>
                                    <input type="number" class="form-control" id="price" name="price" step="0.01" min="0" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="currency">العملة</label>
                            <select class="form-control" id="currency" name="currency" required>
                                <option value="شيكل">شيكل</option>
                                <option value="USD">دولار أمريكي</option>
                                <option value="EUR">يورو</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> حفظ الفحص
                            </button>
                            <a href="{{ url_for('lab.tests') }}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left"></i> العودة
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
