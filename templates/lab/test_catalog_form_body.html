{% set uid = t.id if t else 'new' %}
<div class="row">
  <div class="col-md-6 mb-3">
    <label class="form-label">الكود <span class="text-danger">*</span></label>
    <input class="form-control" name="code" value="{{ t.code if t else '' }}" required>
  </div>
  <div class="col-md-6 mb-3">
    <label class="form-label">الاسم (عربي) <span class="text-danger">*</span></label>
    <input class="form-control" name="name_ar" value="{{ t.name_ar if t else '' }}" required>
  </div>
  <div class="col-md-6 mb-3">
    <label class="form-label">الاسم (إنجليزي)</label>
    <input class="form-control" name="name_en" value="{{ t.name_en if t else '' }}">
  </div>
  <div class="col-md-6 mb-3">
    <label class="form-label">التصنيف</label>
    <select class="form-select" name="category">
      {% for c in ['chemistry','hematology','microbiology','serology','immunology','urinalysis','coagulation','other'] %}
      <option value="{{ c }}" {% if t and t.category == c %}selected{% endif %}>{{ c }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-4 mb-3">
    <label class="form-label">الوحدة</label>
    <input class="form-control" name="unit" value="{{ t.unit if t else '' }}">
  </div>
  <div class="col-md-4 mb-3">
    <label class="form-label">المدى المرجعي</label>
    <input class="form-control" name="default_reference_range" value="{{ t.default_reference_range if t else '' }}">
  </div>
  <div class="col-md-4 mb-3">
    <label class="form-label">السعر</label>
    <input class="form-control" name="price" type="number" step="0.01" value="{{ t.price if t else '' }}">
  </div>
  <div class="col-md-4 mb-3">
    <label class="form-label">حد أدنى حرج</label>
    <input class="form-control" name="critical_low" value="{{ t.critical_low if t else '' }}">
  </div>
  <div class="col-md-4 mb-3">
    <label class="form-label">حد أعلى حرج</label>
    <input class="form-control" name="critical_high" value="{{ t.critical_high if t else '' }}">
  </div>
  <div class="col-md-4 mb-3">
    <label class="form-label">ترتيب الفرز</label>
    <input class="form-control" name="sort_order" type="number" value="{{ t.sort_order if t else '0' }}">
  </div>
  <div class="col-12 mb-3">
    <label class="form-label">تعليمات التحضير</label>
    <textarea class="form-control" name="preparation_instructions" rows="2">{{ t.preparation_instructions if t else '' }}</textarea>
  </div>
  <div class="col-12 mb-3">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" name="is_active" value="1" id="is_active_{{ uid }}" {% if not t or t.is_active %}checked{% endif %}>
      <label class="form-check-label" for="is_active_{{ uid }}">نشط</label>
    </div>
  </div>
</div>
