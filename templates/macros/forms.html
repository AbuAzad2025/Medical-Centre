{% macro field(row, label=None, help=None) -%}
  <div class="mb-3">
    <label class="form-label">{{ label or row.label.text }}</label>
    {{ row(class="form-control") }}
    {% if help %}<div class="form-text">{{ help }}</div>{% endif %}
    {% if row.errors %}
      <div class="text-danger small">{{ row.errors|join('، ') }}</div>
    {% endif %}
  </div>
{%- endmacro %}

{% macro csrf() -%}
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
{%- endmacro %}
