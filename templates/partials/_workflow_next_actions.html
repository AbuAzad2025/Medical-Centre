{% macro workflow_next_actions(visit, next_actions) %}
<div class="card mb-3">
    <div class="card-header">
        <i class="fas fa-arrow-right"></i> الإجراءات التالية
    </div>
    <div class="card-body">
        {% if next_actions %}
        <div class="d-flex flex-wrap gap-2">
            {% for action in next_actions %}
            <span class="badge bg-info">{{ action }}</span>
            {% endfor %}
        </div>
        {% else %}
        <p class="text-muted mb-0">لا توجد إجراءات متاحة - الزيارة مكتملة</p>
        {% endif %}
    </div>
</div>
{% endmacro %}
