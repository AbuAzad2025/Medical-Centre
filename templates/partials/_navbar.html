<style>
:root {
        --luxury-gold: #D4AF37;
        --luxury-dark: #1a1f3a;
        --luxury-gradient: linear-gradient(135deg, #1a1f3a 0%, #2c3e50 100%);
        --luxury-gold-gradient: linear-gradient(135deg, #D4AF37 0%, #F2D06B 100%);
    }
    .luxury-header {
        background: var(--luxury-gradient);
        border-bottom: 1px solid var(--luxury-gold);
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        padding: 0.25rem 1rem; /* Compact padding */
        position: sticky;
        top: 0;
        z-index: 1050; /* Higher than sidebar */
        backdrop-filter: blur(10px);
        height: 60px; /* Fixed compact height */
    }
    .luxury-brand {
        font-family: 'Amiri', serif;
        font-size: 1.2rem;
        color: white !important;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .luxury-brand img {
        height: 35px; /* Smaller logo */
        filter: drop-shadow(0 0 5px rgba(212,175,55,0.5));
    }
    .luxury-nav-link {
        color: rgba(255,255,255,0.9) !important;
        font-weight: 500;
        padding: 0.4rem 0.8rem !important;
        border-radius: 6px;
        transition: all 0.3s;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.9rem;
    }
    .luxury-nav-link i {
        color: var(--luxury-gold);
    }
    .luxury-nav-link:hover, .luxury-nav-link.active {
        background: rgba(212,175,55,0.15);
        color: var(--luxury-gold) !important;
        border: 1px solid rgba(212,175,55,0.3);
    }
    .clock-widget {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(212,175,55,0.3);
        border-radius: 50px;
        padding: 4px 15px;
        color: var(--luxury-gold);
        font-family: 'Courier New', monospace;
        font-weight: bold;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
    }
    .user-profile-btn {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(212,175,55,0.3);
        color: white !important;
        padding: 4px 12px;
        border-radius: 50px;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.3s;
        cursor: pointer;
        font-size: 0.9rem;
    }
    .user-profile-btn:hover {
        background: rgba(212,175,55,0.2);
        box-shadow: 0 0 10px rgba(212,175,55,0.2);
    }
    .dropdown-menu-dark-luxury {
        background: #1a1f3a;
        border: 1px solid var(--luxury-gold);
        box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    }
    .dropdown-menu-dark-luxury .dropdown-item {
        color: rgba(255,255,255,0.9);
        padding: 8px 15px;
        font-size: 0.9rem;
    }
    .dropdown-menu-dark-luxury .dropdown-item:hover {
        background: rgba(212,175,55,0.2);
        color: var(--luxury-gold);
    }
    .dropdown-divider {
        border-top-color: rgba(255,255,255,0.1);
    }
    .luxury-icon-gold { color: var(--luxury-gold); }
    .luxury-icon-flag { color: var(--palestine-green); }
    .luxury-icon-cyan { color: var(--medical-cyan); opacity: 0.7; }
    .nav-subtitle { font-size: 0.75rem; opacity: 0.7; }
    .notif-dot { width: 8px; height: 8px; }
    .user-avatar-circle { width: 28px; height: 28px; font-size: 0.8rem; }
    .dropdown-meta { font-size: 0.75rem; padding: 0.25rem 1rem; }
</style>

<header class="luxury-header d-flex align-items-center justify-content-between">
    <!-- Left Section: Toggle & Brand -->
    <div class="d-flex align-items-center">
        <button class="btn btn-link text-white p-0 me-3 d-lg-none" id="sidebarToggle" aria-label="فتح/إغلاق القائمة الجانبية"
            >
            <i class="fas fa-bars fa-lg luxury-icon-gold"></i> <span class="btn-label">القائمة</span>
        </button>
        <a href="{{ url_for('main.dashboard') }}" class="luxury-brand">
            <img src="{{ branding.logo_path or url_for('static', filename='img/azad_logo.png') }}" alt="Logo">
            <span class="d-none d-md-block fw-bold">{{ branding.organization_name if branding else 'المركز الطبي' }}</span>
            <span class="ms-2 nav-subtitle" title="Palestinian Medical Platform">
                <i class="fas fa-flag luxury-icon-flag"></i>
            </span>
        </a>
    </div>

    <!-- Center Section: Live Clock (Visible on md+) -->
    <div class="d-none d-md-flex align-items-center justify-content-center flex-grow-1">
        <div class="clock-widget" id="liveClockWidget">
            <i class="far fa-clock"></i>
            <span id="currentDate">--/--/----</span>
            <span class="mx-1">|</span>
            <span id="currentTime">--:-- --</span>
        </div>
    </div>

    <!-- Right Section: User Menu -->
    {% if current_user.is_authenticated %}
    <div class="d-flex align-items-center gap-2">
        <!-- Notifications (Example) -->
        <button type="button" class="btn btn-link position-relative p-1 text-white opacity-75 hover-opacity-100" title="الإشعارات" aria-label="الإشعارات"><i class="fas fa-bell"></i> <span class="btn-label">إشعارات</span>
            <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle notif-dot"></span>
        </button>

        <!-- User Dropdown -->
        <div class="dropdown">
            <button type="button" class="user-profile-btn dropdown-toggle text-decoration-none" data-bs-toggle="dropdown">
                <div class="bg-gradient-warning text-dark rounded-circle d-flex align-items-center justify-content-center fw-bold user-avatar-circle">
                    {{ current_user.full_name[0] if current_user.full_name else 'U' }}
                </div>
                <span class="d-none d-lg-block">{{ current_user.full_name.split()[0] if current_user.full_name else current_user.username }}</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark-luxury shadow-lg mt-2">
                <li><h6 class="dropdown-header text-warning fw-bold">{{ current_user.role|upper }}</h6></li>
                <li><span class="dropdown-item-text text-muted dropdown-meta">
                    <i class="fas fa-hospital me-1 luxury-icon-cyan"></i> AZAD Medical
                </span></li>
                <li><a class="dropdown-item" href="{{ url_for('auth.profile') }}"><i class="fas fa-user-circle me-2"></i>الملف الشخصي</a></li>
                <li><a class="dropdown-item" href="{{ url_for('auth.profile') }}"><i class="fas fa-cog me-2"></i>الإعدادات</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="{{ url_for('auth.logout') }}"><i class="fas fa-sign-out-alt me-2"></i>تسجيل خروج</a></li>
            </ul>
        </div>
    </div>
    {% else %}
    <a href="{{ url_for('auth.login') }}" class="btn btn-sm btn-outline-warning rounded-pill px-3">
        <i class="fas fa-sign-in-alt me-1"></i> دخول
    </a>
    {% endif %}
</header>

<script src="{{ url_for('static', filename='js/pages/partials/_navbar.js') }}"></script>
