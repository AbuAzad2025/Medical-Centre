{% macro attachment_panel(files, entity_type, entity_id, upload_url) %}
<div class="card mb-3">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="fas fa-paperclip me-1"></i> المرفقات</span>
        {% if upload_url %}
        <a href="{{ upload_url }}?type={{ entity_type }}&id={{ entity_id }}" class="btn btn-sm btn-outline-primary">
            <i class="fas fa-upload"></i> رفع
        </a>
        {% endif %}
    </div>
    <div class="card-body">
        {% if files %}
        <div class="list-group list-group-flush">
            {% for f in files %}
            <div class="list-group-item px-0 d-flex justify-content-between align-items-center">
                <div>
                    <i class="fas fa-file me-2 text-muted"></i>
                    <span>{{ f.original_filename }}</span>
                    <small class="text-muted d-block">{{ (f.file_size / 1024)|round(1) }} KB</small>
                </div>
                <div>
                    <a href="{{ url_for('main.download_file', file_id=f.id) }}" class="btn btn-sm btn-outline-secondary">
                        <i class="fas fa-download"></i>
                    </a>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <p class="text-muted text-center py-2 mb-0">لا توجد مرفقات</p>
        {% endif %}
    </div>
</div>
{% endmacro %}
