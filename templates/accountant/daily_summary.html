{% extends "base.html" %}

{% block title %}ملخص يومي{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <h2 class="mb-0 text-primary">الملخص اليومي</h2>
                    <a href="{{ url_for('accountant.dashboard') }}" class="btn btn-secondary">رجوع</a>
                </div>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-12">
            <div class="card shadow">
                <div class="card-body">
                    <div class="mb-2"><strong>الفترة:</strong> {{ summary.period }}</div>
                    <div class="mb-2"><strong>المدفوعات:</strong> {{ summary.total_payments }}</div>
                    <div class="mb-2"><strong>الزيارات المكتملة:</strong> {{ summary.visits|length if summary.visits is defined else 0 }}</div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
