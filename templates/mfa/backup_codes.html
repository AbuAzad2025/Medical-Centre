{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm border-success">
        <div class="card-header bg-success text-white">
          <h5 class="mb-0"><i class="bi bi-key me-2"></i>تم تفعيل 2FA بنجاح!</h5>
        </div>
        <div class="card-body">
          <div class="alert alert-warning">
            <strong>احفظ هذه الأرقام الاحتياطية في مكان آمن.</strong> كل رمز يُستخدم مرة واحدة فقط.
          </div>
          <div class="row g-2">
            {% for code in codes %}
              <div class="col-6 col-md-4">
                <div class="p-2 bg-light border rounded text-center font-monospace fw-bold">{{ code }}</div>
              </div>
            {% endfor %}
          </div>
          <div class="d-grid mt-3">
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary">الذهاب للوحة التحكم</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
