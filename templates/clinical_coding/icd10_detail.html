{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
  <h4><i class="bi bi-file-medical me-2"></i>تفاصيل تشخيص ICD-10</h4>
  <div class="card shadow-sm">
    <div class="card-body">
      <div class="row">
        <div class="col-sm-3 fw-bold">الكود</div><div class="col-sm-9"><code>{{ code.code }}</code></div>
        <div class="col-sm-3 fw-bold">الاسم</div><div class="col-sm-9">{{ code.name }}</div>
        {% if code.name_ar %}
        <div class="col-sm-3 fw-bold">الاسم العربي</div><div class="col-sm-9">{{ code.name_ar }}</div>
        {% endif %}
        <div class="col-sm-3 fw-bold">الفئة</div><div class="col-sm-9">{{ code.category or '—' }}</div>
        <div class="col-sm-3 fw-bold">الوصف</div><div class="col-sm-9">{{ code.description or '—' }}</div>
      </div>
      <a href="{{ url_for('clinical_coding.icd10_list') }}" class="btn btn-secondary">رجوع</a>
    </div>
  </div>
</div>
{% endblock %}
