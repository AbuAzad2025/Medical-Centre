<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ branding.organization_name if branding else 'المركز الصحي المتخصص' }} - نظام إدارة متطور{% endblock %}</title>
    
    <meta name="description" content="نظام إدارة {{ branding.organization_name if branding else 'المركز الصحي المتخصص' }} - حلول طبية متطورة وذكية">
    <meta name="keywords" content="نظام طبي, إدارة مستشفى, مركز صحي, نظام ذكي">
    <meta name="author" content="{{ developer_company or 'شركة ازاد للأنظمة الذكية' }}">
    <meta name="robots" content="index, follow">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modern-medical.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/performance.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/accessibility.css') }}">
    
    <style>
        /* Force everything to be visible immediately */
        body, * {
            opacity: 1 !important;
            visibility: visible !important;
        }
        
        /* Disable AOS hiding completely */
        [data-aos] {
            opacity: 1 !important;
            visibility: visible !important;
            pointer-events: auto !important;
            transform: none !important;
        }
    </style>
    
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta name="app-env" content="{{ APP_ENV or 'development' }}">
    <link rel="icon" href="{{ url_for('static', filename='img/azad_logo.png') }}" type="image/png">
    
    <style>
        :root {
            /* Luxury Gulf Theme */
            --gulf-gold: #D4AF37;
            --gulf-blue: #1B4D89;
            --luxury-purple: #6B46C1;
            --gradient-gulf: linear-gradient(135deg, #1B4D89 0%, #6B46C1 50%, #D4AF37 100%);
            --gradient-luxury: linear-gradient(to right, #0a0e27, #1a1f3a);
            
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --info-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --warning-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --danger-gradient: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            --dark-gradient: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            --secondary-gradient: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 15px 35px rgba(0, 0, 0, 0.15);
            --border-radius: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Luxury Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gulf-blue); 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--gulf-gold); 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', 'Inter', 'Cairo', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .glass-effect {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-soft);
        }
        
        .card-modern {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-soft);
            transition: var(--transition);
        }
        
        .card-modern:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }
        
        .btn-modern {
            border-radius: 15px;
            padding: 12px 24px;
            font-weight: 600;
            transition: var(--transition);
            border: none;
            position: relative;
            overflow: hidden;
        }
        
        .btn-modern::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn-modern:hover::before {
            left: 100%;
        }
        
        .gradient-text {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .floating-animation {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .pulse-animation {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .sidebar-modern {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            min-height: 100vh;
        }
        
        .navbar-modern {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        }
        
        .icon-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        
        .card-modern:hover .icon-circle {
            transform: scale(1.1) rotate(5deg);
        }
        
        .sidebar.collapsed {
            display: none;
        }

        /* Improved Tab Visibility */
        .nav-pills .nav-link {
            color: var(--gulf-blue) !important;
            font-weight: 600;
            background-color: rgba(255, 255, 255, 0.5);
            margin: 0 5px;
            border: 1px solid rgba(27, 77, 137, 0.1);
        }
        
        .nav-pills .nav-link:hover {
            background-color: rgba(27, 77, 137, 0.1);
            color: var(--gulf-blue) !important;
        }

        .nav-pills .nav-link.active {
            background-color: var(--gulf-blue) !important;
            color: #fff !important;
            box-shadow: 0 4px 6px rgba(27, 77, 137, 0.2);
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include 'partials/_navbar.html' %}

    {% include 'partials/_flash.html' %}

    <div class="main-layout">
        {% include 'partials/_sidebar.html' %}
        
        <main class="main-container">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% include 'partials/_footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>
    <script src="{{ url_for('static', filename='adminlte/plugins/sweetalert2/sweetalert2.all.min.js') }}"></script>
    <!-- Load app.js as ES Module (handles flash/csrf/dt/digits) -->
    <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/performance.js') }}"></script>
    <script src="{{ url_for('static', filename='js/security.js') }}"></script>
    
    <script>
        // Disable AOS completely - show everything immediately
        document.addEventListener('DOMContentLoaded', function() {
            try {
                var envEl = document.querySelector('meta[name="app-env"]');
                window.__ENV = (envEl && envEl.getAttribute('content')) || 'development';
                if (window.__ENV === 'production') {
                    console.debug = function(){};
                    console.log = function(){};
                }
            } catch (e) {}
            // Force everything to be visible
            document.body.style.opacity = '1';
            document.body.style.visibility = 'visible';
            
            // Make sure all elements are visible
            document.querySelectorAll('*').forEach(el => {
                el.style.opacity = '1';
                el.style.visibility = 'visible';
            });
            
            // Disable AOS completely
            if (typeof AOS !== 'undefined') {
                console.log('AOS disabled - all elements visible');
                document.querySelectorAll('[data-aos]').forEach(el => {
                    el.removeAttribute('data-aos');
                    el.style.opacity = '1';
                    el.style.visibility = 'visible';
                    el.style.transform = 'none';
                    el.style.pointerEvents = 'auto';
                });
            } else {
                document.querySelectorAll('[data-aos]').forEach(el => {
                    el.style.opacity = '1';
                    el.style.transform = 'none';
                });
            }

            // Sidebar toggle accessibility
            const sidebar = document.getElementById('appSidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            if (sidebar && toggleBtn) {
                try {
                    const saved = localStorage.getItem('sidebarCollapsed');
                    if (saved === '1') {
                        sidebar.classList.add('collapsed');
                        toggleBtn.setAttribute('aria-expanded', 'false');
                    }
                    toggleBtn.addEventListener('click', function() {
                        const isCollapsed = sidebar.classList.toggle('collapsed');
                        this.setAttribute('aria-expanded', isCollapsed ? 'false' : 'true');
                        try { localStorage.setItem('sidebarCollapsed', isCollapsed ? '1' : '0'); } catch (e) {}
                    });
                } catch (e) {
                    console.warn('Sidebar toggle init failed:', e);
                }
            }
        });
        
        // GSAP Animations
        if (typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined') {
            try {
                gsap.registerPlugin(ScrollTrigger);
            } catch (e) {
                console.warn('GSAP initialization failed:', e);
            }
        }
        
        // Smooth scrolling for all links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
        
        try {
            var theme = localStorage.getItem('theme');
            if (theme) document.documentElement.setAttribute('data-theme', theme);
            var density = localStorage.getItem('ui_density');
            if (density) document.documentElement.setAttribute('data-density', density);
            var radius = localStorage.getItem('ui_radius');
            if (radius) document.documentElement.setAttribute('data-radius', radius);
        } catch (e) {}
        
        // Modern Loading Animation
        window.addEventListener('load', function() {
            gsap.from('.card-modern', {
                duration: 0.8,
                y: 50,
                opacity: 0,
                stagger: 0.1,
                ease: "power2.out"
            });
        });
        
        // Smart Search with Debouncing
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
        
        // Enhanced Form Validation
        function validateForm(form) {
            const inputs = form.querySelectorAll('input[required], select[required], textarea[required]');
            let isValid = true;
            
            inputs.forEach(input => {
                if (!input.value.trim()) {
                    input.classList.add('is-invalid');
                    isValid = false;
                } else {
                    input.classList.remove('is-invalid');
                    input.classList.add('is-valid');
                }
            });
            
            return isValid;
        }
        
        // Smart Notifications
        function showNotification(message, type = 'info', duration = 5000) {
            const notification = document.createElement('div');
            notification.className = `alert alert-${type} alert-dismissible fade show position-fixed`;
            notification.style.cssText = `
                top: 20px;
                right: 20px;
                z-index: 9999;
                min-width: 300px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                border: none;
                border-radius: 15px;
            `;
            
            notification.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'} me-2"></i>
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            document.body.appendChild(notification);
            
            // Auto remove
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.remove();
                }
            }, duration);
        }
        
        // SweetAlert2 Confirm Helpers
        function confirmNavigate(e, message) {
            e.preventDefault();
            const url = e.currentTarget.href;
            Swal.fire({
                title: 'تأكيد',
                text: message,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'نعم',
                cancelButtonText: 'إلغاء'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = url;
                }
            });
            return false;
        }

        function confirmSubmit(e, message) {
            e.preventDefault();
            const form = e.currentTarget.form || e.currentTarget.closest('form');
            if (!form) return false;
            Swal.fire({
                title: 'تأكيد',
                text: message,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'نعم',
                cancelButtonText: 'إلغاء'
            }).then((result) => {
                if (result.isConfirmed) {
                    form.submit();
                }
            });
            return false;
        }
        
        // Advanced Table Features
        function initAdvancedTable(tableId) {
            const table = document.getElementById(tableId);
            if (!table) return;
            
            // Add search functionality
            const searchInput = document.createElement('input');
            searchInput.type = 'text';
            searchInput.className = 'form-control mb-3';
            searchInput.placeholder = 'البحث...';
            searchInput.style.borderRadius = '15px';
            
            table.parentNode.insertBefore(searchInput, table);
            
            searchInput.addEventListener('input', debounce(function() {
                const filter = this.value.toLowerCase();
                const rows = table.querySelectorAll('tbody tr');
                
                rows.forEach(row => {
                    const text = row.textContent.toLowerCase();
                    row.style.display = text.includes(filter) ? '' : 'none';
                });
            }, 300));
            
            // Add sorting functionality
            const headers = table.querySelectorAll('th[data-sort]');
            headers.forEach(header => {
                header.style.cursor = 'pointer';
                header.innerHTML += ' <i class="fas fa-sort ms-1"></i>';
                
                header.addEventListener('click', function() {
                    const column = this.dataset.sort;
                    const tbody = table.querySelector('tbody');
                    const rows = Array.from(tbody.querySelectorAll('tr'));
                    
                    const isAsc = this.classList.contains('sort-asc');
                    
                    rows.sort((a, b) => {
                        const aVal = a.querySelector(`[data-${column}]`)?.textContent || '';
                        const bVal = b.querySelector(`[data-${column}]`)?.textContent || '';
                        
                        return isAsc ? bVal.localeCompare(aVal) : aVal.localeCompare(bVal);
                    });
                    
                    // Clear previous sort classes
                    headers.forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
                    
                    // Add new sort class
                    this.classList.add(isAsc ? 'sort-desc' : 'sort-asc');
                    
                    // Reorder rows
                    rows.forEach(row => tbody.appendChild(row));
                });
            });
        }
        
        // Real-time Clock
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('ar-SA', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            const dateString = now.toLocaleDateString('ar-SA', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            
            const clockElements = document.querySelectorAll('.live-clock');
            clockElements.forEach(element => {
                element.innerHTML = `${timeString} - ${dateString}`;
            });
        }
        
        // Update clock every second
        setInterval(updateClock, 1000);
        updateClock();
        
        // Smart Auto-save
        function initAutoSave(formId, interval = 30000) {
            const form = document.getElementById(formId);
            if (!form) return;
            
            const inputs = form.querySelectorAll('input, select, textarea');
            let hasChanges = false;
            
            inputs.forEach(input => {
                input.addEventListener('input', () => {
                    hasChanges = true;
                });
            });
            
            setInterval(() => {
                if (hasChanges) {
                    // Auto-save logic here
                    console.log('Auto-saving form...');
                    hasChanges = false;
                }
            }, interval);
        }
        
        // Performance Monitoring
        function initPerformanceMonitoring() {
            // Monitor page load time
            window.addEventListener('load', () => {
                const loadTime = performance.now();
                console.log(`Page loaded in ${loadTime.toFixed(2)}ms`);
            });
            
            // Monitor API response times
            const originalFetch = window.fetch;
            if (!originalFetch.__csrfPerfPatched) {
            window.fetch = function(input, init) {
                const start = performance.now();
                const headers = new Headers((init && init.headers) || {});
                const tokenEl = document.querySelector('meta[name="csrf-token"]');
                if (tokenEl && !headers.has('X-CSRFToken')) {
                    const token = tokenEl.getAttribute('content') || tokenEl.content;
                    if (token) headers.set('X-CSRFToken', token);
                }
                const newInit = Object.assign({}, init || {}, { headers });
                return originalFetch.call(this, input, newInit).then(response => {
                    const end = performance.now();
                    if (!window.__apiMetrics) { window.__apiMetrics = { calls: 0, time: 0 }; }
                    window.__apiMetrics.calls += 1;
                    window.__apiMetrics.time += (end - start);
                    console.log(`API call took ${(end - start).toFixed(2)}ms`);
                    return response;
                });
            };
            window.fetch.__csrfPerfPatched = true;
            }
        }
        
        // Initialize everything when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize performance monitoring
            initPerformanceMonitoring();
            
            // Initialize all advanced tables
            document.querySelectorAll('table[id]').forEach(table => {
                initAdvancedTable(table.id);
            });
            
            // Add modern hover effects to cards
            document.querySelectorAll('.card').forEach(card => {
                card.classList.add('card-modern');
            });
            
            // Add modern button effects
            document.querySelectorAll('.btn').forEach(btn => {
                btn.classList.add('btn-modern');
            });
            
            // Initialize tooltips
            const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
            tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl);
            });
            
            // Initialize popovers
            const popoverTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="popover"]'));
            popoverTriggerList.map(function (popoverTriggerEl) {
                return new bootstrap.Popover(popoverTriggerEl);
            });

            function enforceSafeLinks(){
                document.querySelectorAll('a').forEach(function(a){
                    var href = a.getAttribute('href') || '';
                    var isPlaceholder = href === '#' || href.trim() === '';
                    var isToggle = a.hasAttribute('data-bs-toggle');
                    if (isPlaceholder) {
                        a.setAttribute('href','javascript:void(0)');
                        a.setAttribute('role','button');
                        a.setAttribute('tabindex','0');
                    }
                    if (isPlaceholder || isToggle) {
                        a.addEventListener('click', function(e){ e.preventDefault(); });
                    }
                    if (window.__ENV !== 'production' && isPlaceholder && !isToggle && !a.getAttribute('onclick')){
                        try {
                            var label = (a.textContent || a.getAttribute('aria-label') || '').trim();
                            if (label) console.warn('Placeholder link detected:', label);
                        } catch (e) {}
                    }
                });
            }
            enforceSafeLinks();

            const tabSelectors = ['a[data-bs-toggle="tab"]', '.nav-link[data-bs-toggle="tab"]', 'button[data-bs-toggle="tab"]'];
            document.querySelectorAll(tabSelectors.join(',')).forEach(function(tabLink){
                tabLink.addEventListener('shown.bs.tab', function(ev){
                    const targetSel = ev.target.getAttribute('href') || ev.target.getAttribute('data-bs-target');
                    const pane = targetSel && document.querySelector(targetSel);
                    if (pane) {
                        // Adjust DataTables inside pane
                        try {
                            if (window.$ && window.$.fn && window.$.fn.DataTable) {
                                pane.querySelectorAll('table[data-dt="1"]').forEach(function(tbl){
                                    const dt = window.$(tbl).DataTable();
                                    if (dt) dt.columns.adjust();
                                });
                            }
                        } catch (e) {}
                        // Lazy load content if data-load-url is present
                        const url = pane.getAttribute('data-load-url');
                        if (url && !pane.getAttribute('data-loaded')) {
                            fetch(url, { method: 'GET', headers: { 'Accept': 'text/html' } })
                                .then(r => r.text())
                                .then(html => { pane.innerHTML = html; pane.setAttribute('data-loaded','1'); })
                                .catch(()=>{});
                        }
                    }
                });
            });
        });
        
        // Global error handler - only for critical errors
        window.addEventListener('error', function(e) {
            // Ignore minor errors and resource loading errors
            if (e.filename && (e.filename.includes('.map') || e.filename.includes('favicon'))) {
                return;
            }
            console.error('Global error:', e.error);
            // Only show notification for actual JavaScript errors
            if (e.error && e.error.stack) {
                showNotification('حدث خطأ غير متوقع. يرجى إعادة تحميل الصفحة.', 'error');
            }
        });
        
        // Service Worker for PWA capabilities
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register("{{ url_for('static', filename='sw.js') }}")
                    .then(function(registration) {
                        console.log('ServiceWorker registration successful');
                    })
                    .catch(function(err) {
                        console.log('ServiceWorker registration failed:', err);
                    });
            });
        }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
