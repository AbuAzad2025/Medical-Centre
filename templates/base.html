<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}المركز الصحي المتخصص - نظام إدارة متطور{% endblock %}</title>
    
    <!-- Meta Tags for SEO and Performance -->
    <meta name="description" content="نظام إدارة المركز الصحي المتخصص - حلول طبية متطورة وذكية">
    <meta name="keywords" content="نظام طبي, إدارة مستشفى, مركز صحي, نظام ذكي">
    <meta name="author" content="شركة ازاد للأنظمة الذكية">
    <meta name="robots" content="index, follow">
    
    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    
    <!-- Google Fonts - Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Pro -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Bootstrap 5.3 with RTL -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    
    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modern-medical.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/performance.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/accessibility.css') }}">
    
    <!-- Ensure everything is visible - NO hiding at all -->
    <style>
        /* Force everything to be visible immediately */
        body, * {
            opacity: 1 !important;
            visibility: visible !important;
        }
        
        /* Disable AOS hiding completely */
        [data-aos] {
            opacity: 1 !important;
            visibility: visible !important;
            pointer-events: auto !important;
            transform: none !important;
        }
    </style>
    
    <!-- CSRF Token -->
    <meta name="csrf-token" content="{{ csrf_token() }}">
    
    <!-- Custom Styles -->
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --info-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --warning-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --danger-gradient: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            --dark-gradient: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            --secondary-gradient: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 15px 35px rgba(0, 0, 0, 0.15);
            --border-radius: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Cairo', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .glass-effect {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-soft);
        }
        
        .card-modern {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-soft);
            transition: var(--transition);
        }
        
        .card-modern:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }
        
        .btn-modern {
            border-radius: 15px;
            padding: 12px 24px;
            font-weight: 600;
            transition: var(--transition);
            border: none;
            position: relative;
            overflow: hidden;
        }
        
        .btn-modern::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn-modern:hover::before {
            left: 100%;
        }
        
        .gradient-text {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .floating-animation {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .pulse-animation {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .sidebar-modern {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            min-height: 100vh;
        }
        
        .navbar-modern {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Header -->
    {% include 'partials/_navbar.html' %}

    <!-- Flash Messages -->
    {% include 'partials/_flash.html' %}

    <!-- Main Content -->
    <div class="main-layout">
        <!-- Smart Sidebar -->
        {% include 'partials/_sidebar.html' %}
        
        <!-- Main Content -->
        <main class="main-container">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Footer -->
    {% include 'partials/_footer.html' %}

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>
    <!-- Load app.js as module -->
    <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/flash.js') }}"></script>
    <script src="{{ url_for('static', filename='js/csrf.js') }}"></script>
    <script src="{{ url_for('static', filename='js/performance.js') }}"></script>
    <script src="{{ url_for('static', filename='js/security.js') }}"></script>
    
    <!-- Advanced JavaScript -->
    <script>
        // Disable AOS completely - show everything immediately
        document.addEventListener('DOMContentLoaded', function() {
            // Force everything to be visible
            document.body.style.opacity = '1';
            document.body.style.visibility = 'visible';
            
            // Make sure all elements are visible
            document.querySelectorAll('*').forEach(el => {
                el.style.opacity = '1';
                el.style.visibility = 'visible';
            });
            
            // Disable AOS completely
            if (typeof AOS !== 'undefined') {
                // Don't initialize AOS at all
                console.log('AOS disabled - all elements visible');
            }
            
            // Remove all data-aos attributes to prevent any issues
            document.querySelectorAll('[data-aos]').forEach(el => {
                el.removeAttribute('data-aos');
                el.style.opacity = '1';
                el.style.visibility = 'visible';
                el.style.transform = 'none';
                el.style.pointerEvents = 'auto';
            } else {
                // AOS not loaded, show elements anyway
                document.querySelectorAll('[data-aos]').forEach(el => {
                    el.style.opacity = '1';
                    el.style.transform = 'none';
                });
            }
        });
        
        // GSAP Animations
        if (typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined') {
            try {
                gsap.registerPlugin(ScrollTrigger);
            } catch (e) {
                console.warn('GSAP initialization failed:', e);
            }
        }
        
        // Smooth scrolling for all links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
        
        // Modern Loading Animation
        window.addEventListener('load', function() {
            gsap.from('.card-modern', {
                duration: 0.8,
                y: 50,
                opacity: 0,
                stagger: 0.1,
                ease: "power2.out"
            });
        });
        
        // Smart Search with Debouncing
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
        
        // Enhanced Form Validation
        function validateForm(form) {
            const inputs = form.querySelectorAll('input[required], select[required], textarea[required]');
            let isValid = true;
            
            inputs.forEach(input => {
                if (!input.value.trim()) {
                    input.classList.add('is-invalid');
                    isValid = false;
                } else {
                    input.classList.remove('is-invalid');
                    input.classList.add('is-valid');
                }
            });
            
            return isValid;
        }
        
        // Smart Notifications
        function showNotification(message, type = 'info', duration = 5000) {
            const notification = document.createElement('div');
            notification.className = `alert alert-${type} alert-dismissible fade show position-fixed`;
            notification.style.cssText = `
                top: 20px;
                right: 20px;
                z-index: 9999;
                min-width: 300px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                border: none;
                border-radius: 15px;
            `;
            
            notification.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'} me-2"></i>
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            document.body.appendChild(notification);
            
            // Auto remove
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.remove();
                }
            }, duration);
        }
        
        // Advanced Table Features
        function initAdvancedTable(tableId) {
            const table = document.getElementById(tableId);
            if (!table) return;
            
            // Add search functionality
            const searchInput = document.createElement('input');
            searchInput.type = 'text';
            searchInput.className = 'form-control mb-3';
            searchInput.placeholder = 'البحث...';
            searchInput.style.borderRadius = '15px';
            
            table.parentNode.insertBefore(searchInput, table);
            
            searchInput.addEventListener('input', debounce(function() {
                const filter = this.value.toLowerCase();
                const rows = table.querySelectorAll('tbody tr');
                
                rows.forEach(row => {
                    const text = row.textContent.toLowerCase();
                    row.style.display = text.includes(filter) ? '' : 'none';
                });
            }, 300));
            
            // Add sorting functionality
            const headers = table.querySelectorAll('th[data-sort]');
            headers.forEach(header => {
                header.style.cursor = 'pointer';
                header.innerHTML += ' <i class="fas fa-sort ms-1"></i>';
                
                header.addEventListener('click', function() {
                    const column = this.dataset.sort;
                    const tbody = table.querySelector('tbody');
                    const rows = Array.from(tbody.querySelectorAll('tr'));
                    
                    const isAsc = this.classList.contains('sort-asc');
                    
                    rows.sort((a, b) => {
                        const aVal = a.querySelector(`[data-${column}]`)?.textContent || '';
                        const bVal = b.querySelector(`[data-${column}]`)?.textContent || '';
                        
                        return isAsc ? bVal.localeCompare(aVal) : aVal.localeCompare(bVal);
                    });
                    
                    // Clear previous sort classes
                    headers.forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
                    
                    // Add new sort class
                    this.classList.add(isAsc ? 'sort-desc' : 'sort-asc');
                    
                    // Reorder rows
                    rows.forEach(row => tbody.appendChild(row));
                });
            });
        }
        
        // Real-time Clock
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('ar-SA', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            const dateString = now.toLocaleDateString('ar-SA', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            
            const clockElements = document.querySelectorAll('.live-clock');
            clockElements.forEach(element => {
                element.innerHTML = `${timeString} - ${dateString}`;
            });
        }
        
        // Update clock every second
        setInterval(updateClock, 1000);
        updateClock();
        
        // Smart Auto-save
        function initAutoSave(formId, interval = 30000) {
            const form = document.getElementById(formId);
            if (!form) return;
            
            const inputs = form.querySelectorAll('input, select, textarea');
            let hasChanges = false;
            
            inputs.forEach(input => {
                input.addEventListener('input', () => {
                    hasChanges = true;
                });
            });
            
            setInterval(() => {
                if (hasChanges) {
                    // Auto-save logic here
                    console.log('Auto-saving form...');
                    hasChanges = false;
                }
            }, interval);
        }
        
        // Performance Monitoring
        function initPerformanceMonitoring() {
            // Monitor page load time
            window.addEventListener('load', () => {
                const loadTime = performance.now();
                console.log(`Page loaded in ${loadTime.toFixed(2)}ms`);
            });
            
            // Monitor API response times
            const originalFetch = window.fetch;
            window.fetch = function(...args) {
                const start = performance.now();
                return originalFetch.apply(this, args).then(response => {
                    const end = performance.now();
                    console.log(`API call took ${(end - start).toFixed(2)}ms`);
                    return response;
                });
            };
        }
        
        // Initialize everything when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize performance monitoring
            initPerformanceMonitoring();
            
            // Initialize all advanced tables
            document.querySelectorAll('table[id]').forEach(table => {
                initAdvancedTable(table.id);
            });
            
            // Add modern hover effects to cards
            document.querySelectorAll('.card').forEach(card => {
                card.classList.add('card-modern');
            });
            
            // Add modern button effects
            document.querySelectorAll('.btn').forEach(btn => {
                btn.classList.add('btn-modern');
            });
            
            // Initialize tooltips
            const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
            tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl);
            });
            
            // Initialize popovers
            const popoverTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="popover"]'));
            popoverTriggerList.map(function (popoverTriggerEl) {
                return new bootstrap.Popover(popoverTriggerEl);
            });
        });
        
        // Global error handler - only for critical errors
        window.addEventListener('error', function(e) {
            // Ignore minor errors and resource loading errors
            if (e.filename && (e.filename.includes('.map') || e.filename.includes('favicon'))) {
                return;
            }
            console.error('Global error:', e.error);
            // Only show notification for actual JavaScript errors
            if (e.error && e.error.stack) {
                showNotification('حدث خطأ غير متوقع. يرجى إعادة تحميل الصفحة.', 'error');
            }
        });
        
        // Service Worker for PWA capabilities
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register("{{ url_for('static', filename='sw.js') }}")
                    .then(function(registration) {
                        console.log('ServiceWorker registration successful');
                    })
                    .catch(function(err) {
                        console.log('ServiceWorker registration failed:', err);
                    });
            });
        }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
