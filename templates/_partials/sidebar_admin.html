<!-- Admin Sidebar -->
<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-brand">
            <i class="fas fa-user-shield"></i>
            <span>لوحة الإدارة</span>
        </div>
    </div>
    
    <div class="sidebar-content">
        <!-- Dashboard -->
        <div class="menu-section">
            <div class="menu-section-title">الرئيسية</div>
            <a href="{{ url_for('admin.dashboard') }}" class="menu-item {% if 'admin.dashboard' in request.endpoint %}active{% endif %}">
                <i class="fas fa-tachometer-alt"></i>
                <span class="menu-text">لوحة التحكم</span>
            </a>
        </div>

        <!-- User Management -->
        <div class="menu-section">
            <div class="menu-section-title">إدارة المستخدمين</div>
            <a href="{{ url_for('admin.users') }}" class="menu-item {% if 'admin.users' in request.endpoint %}active{% endif %}">
                <i class="fas fa-users"></i>
                <span class="menu-text">المستخدمين</span>
            </a>
            <a href="{{ url_for('admin.add_user') }}" class="menu-item {% if 'admin.add_user' in request.endpoint %}active{% endif %}">
                <i class="fas fa-user-plus"></i>
                <span class="menu-text">إضافة مستخدم</span>
            </a>
        </div>

        <!-- Department Management -->
        <div class="menu-section">
            <div class="menu-section-title">إدارة الأقسام</div>
            <a href="{{ url_for('admin.departments') }}" class="menu-item {% if 'admin.departments' in request.endpoint %}active{% endif %}">
                <i class="fas fa-building"></i>
                <span class="menu-text">الأقسام</span>
            </a>
            <a href="{{ url_for('admin.add_department') }}" class="menu-item {% if 'admin.add_department' in request.endpoint %}active{% endif %}">
                <i class="fas fa-plus"></i>
                <span class="menu-text">إضافة قسم</span>
            </a>
        </div>

        <!-- Role Management -->
        <div class="menu-section">
            <div class="menu-section-title">إدارة الأدوار</div>
            <a href="{{ url_for('admin.roles') }}" class="menu-item {% if 'admin.roles' in request.endpoint %}active{% endif %}">
                <i class="fas fa-user-tag"></i>
                <span class="menu-text">الأدوار</span>
            </a>
            <a href="{{ url_for('admin.permissions') }}" class="menu-item {% if 'admin.permissions' in request.endpoint %}active{% endif %}">
                <i class="fas fa-key"></i>
                <span class="menu-text">الصلاحيات</span>
            </a>
        </div>

        <!-- System Management -->
        <div class="menu-section">
            <div class="menu-section-title">إدارة النظام</div>
            <a href="{{ url_for('admin.system_settings') }}" class="menu-item {% if 'admin.system_settings' in request.endpoint %}active{% endif %}">
                <i class="fas fa-cog"></i>
                <span class="menu-text">إعدادات النظام</span>
            </a>
            <a href="{{ url_for('admin.reports') }}" class="menu-item {% if 'admin.reports' in request.endpoint %}active{% endif %}">
                <i class="fas fa-chart-bar"></i>
                <span class="menu-text">التقارير</span>
            </a>
        </div>
    </div>
</div>
