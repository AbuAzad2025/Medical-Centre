<!-- Reception Sidebar -->
<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-brand">
            <i class="fas fa-user-nurse"></i>
            <span>الاستقبال</span>
        </div>
    </div>
    
    <div class="sidebar-content">
        <!-- Dashboard -->
        <div class="menu-section">
            <div class="menu-section-title">الرئيسية</div>
            <a href="{{ url_for('reception.dashboard') }}" class="menu-item {% if 'reception.dashboard' in request.endpoint %}active{% endif %}">
                <i class="fas fa-tachometer-alt"></i>
                <span class="menu-text">لوحة التحكم</span>
            </a>
        </div>

        <!-- Patient Management -->
        <div class="menu-section">
            <div class="menu-section-title">إدارة المرضى</div>
            <a href="{{ url_for('reception.patients') }}" class="menu-item {% if 'reception.patients' in request.endpoint %}active{% endif %}">
                <i class="fas fa-users"></i>
                <span class="menu-text">قائمة المرضى</span>
            </a>
            <a href="{{ url_for('reception.add_patient') }}" class="menu-item {% if 'reception.add_patient' in request.endpoint %}active{% endif %}">
                <i class="fas fa-user-plus"></i>
                <span class="menu-text">إضافة مريض</span>
            </a>
        </div>

        <!-- Visit Management -->
        <div class="menu-section">
            <div class="menu-section-title">إدارة الزيارات</div>
            <a href="{{ url_for('reception.visits') }}" class="menu-item {% if 'reception.visits' in request.endpoint %}active{% endif %}">
                <i class="fas fa-calendar-check"></i>
                <span class="menu-text">قائمة الزيارات</span>
            </a>
            <a href="{{ url_for('reception.create_visit') }}" class="menu-item {% if 'reception.create_visit' in request.endpoint %}active{% endif %}">
                <i class="fas fa-plus-circle"></i>
                <span class="menu-text">إنشاء زيارة</span>
            </a>
        </div>

        <!-- Payment Management -->
        <div class="menu-section">
            <div class="menu-section-title">إدارة المدفوعات</div>
            <a href="{{ url_for('reception.process_payment') }}" class="menu-item {% if 'reception.process_payment' in request.endpoint %}active{% endif %}">
                <i class="fas fa-credit-card"></i>
                <span class="menu-text">معالجة الدفع</span>
            </a>
        </div>

        <!-- Reports -->
        <div class="menu-section">
            <div class="menu-section-title">التقارير</div>
            <a href="#" class="menu-item">
                <i class="fas fa-chart-bar"></i>
                <span class="menu-text">تقارير الاستقبال</span>
            </a>
        </div>
    </div>
</div>
