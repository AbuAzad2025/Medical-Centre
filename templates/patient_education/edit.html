{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
  <h4><i class="bi bi-book me-2"></i>تعديل مادة تعليمية</h4>
  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post" enctype="multipart/form-data">
        <div class="mb-3">
          <label for="title" class="form-label">العنوان</label>
          <input type="text" class="form-control" id="title" name="title" value="{{ material.title }}" required>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label for="category" class="form-label">التصنيف</label>
            <select class="form-select" id="category" name="category">
              <option value="medication" {% if material.category == 'medication' %}selected{% endif %}>دواء</option>
              <option value="disease" {% if material.category == 'disease' %}selected{% endif %}>مرض</option>
              <option value="procedure" {% if material.category == 'procedure' %}selected{% endif %}>إجراء</option>
              <option value="lifestyle" {% if material.category == 'lifestyle' %}selected{% endif %}>نمط حياة</option>
              <option value="nutrition" {% if material.category == 'nutrition' %}selected{% endif %}>تغذية</option>
              <option value="post_op" {% if material.category == 'post_op' %}selected{% endif %}>ما بعد الجراحة</option>
              <option value="general" {% if material.category == 'general' %}selected{% endif %}>عام</option>
            </select>
          </div>
          <div class="col-md-6">
            <label for="language" class="form-label">اللغة</label>
            <select class="form-select" id="language" name="language">
              <option value="ar" {% if material.language == 'ar' %}selected{% endif %}>العربية</option>
              <option value="en" {% if material.language == 'en' %}selected{% endif %}>English</option>
            </select>
          </div>
        </div>
        <div class="mb-3">
          <label for="content_html" class="form-label">محتوى HTML</label>
          <textarea class="form-control" id="content_html" name="content_html" rows="5">{{ material.content_html or '' }}</textarea>
        </div>
        <div class="mb-3">
          <label for="content_text" class="form-label">نص بديل</label>
          <textarea class="form-control" id="content_text" name="content_text" rows="3">{{ material.content_text or '' }}</textarea>
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="is_active" name="is_active" {% if material.is_active %}checked{% endif %}>
          <label class="form-check-label" for="is_active">مفعّل</label>
        </div>
        <div class="mb-3">
          <label for="file" class="form-label">ملف مرفق جديد (اختياري)</label>
          <input type="file" class="form-control" id="file" name="file" accept=".pdf,.png,.jpg,.jpeg,.gif,.mp4,.webm">
          {% if material.file_path %}<div class="mt-1"><small>الملف الحالي: <a href="{{ material.file_path }}" target="_blank">عرض</a></small></div>{% endif %}
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary">تحديث</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
