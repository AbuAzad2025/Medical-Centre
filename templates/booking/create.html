{% extends "base.html" %}
{% block title %}إنشاء حجز{% endblock %}
{% block content %}
<div class="container">
  <h2 class="mb-3"><i class="fas fa-calendar-check me-2"></i> إنشاء حجز جديد</h2>
  <form method="post" action="{{ url_for('booking.create_booking') }}" class="card p-3 shadow-sm">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="row g-3">
      <div class="col-md-3"><label class="form-label">الاسم الأول</label><input name="first_name" class="form-control" required value="{{ patient_prefill.first_name if patient_prefill else '' }}"></div>
      <div class="col-md-3"><label class="form-label">اسم العائلة</label><input name="last_name" class="form-control" required value="{{ patient_prefill.last_name if patient_prefill else '' }}"></div>
      <div class="col-md-3"><label class="form-label">هاتف</label><input name="phone" class="form-control" required value="{{ patient_prefill.phone if patient_prefill else '' }}"></div>
      <div class="col-md-3"><label class="form-label">بريد</label><input name="email" type="email" class="form-control" value="{{ patient_prefill.email if patient_prefill and patient_prefill.email else '' }}"></div>
      <div class="col-md-6"><label class="form-label">القسم</label><select id="department_id" name="department_id" class="form-select" required onchange="loadDoctors()">
        <option value="">اختر القسم</option>
        {% for d in departments or [] %}<option value="{{ d.id }}" {% if preset_department_id and preset_department_id == d.id %}selected{% endif %}>{{ d.name_ar or d.name }}</option>{% endfor %}
      </select></div>
      <div class="col-md-6"><label class="form-label">الطبيب</label><select id="doctor_id" name="doctor_id" class="form-select" required onchange="loadTimes()">
        <option value="">اختر الطبيب</option>
        {% for doc in doctors or [] %}<option value="{{ doc.id }}" {% if preset_doctor_id and preset_doctor_id == doc.id %}selected{% endif %}>{{ doc.full_name }}</option>{% endfor %}
      </select></div>
      <div class="col-md-4"><label class="form-label">التاريخ</label><input id="appointment_date" name="appointment_date" type="date" class="form-control" required value="{{ preset_date or '' }}" onchange="loadTimes()"></div>
      <div class="col-md-4"><label class="form-label">الوقت المتاح</label>
        <select id="appointment_time" name="appointment_time" class="form-select" required>
          <option value="">اختر الوقت</option>
          {% if preset_time %}<option value="{{ preset_time }}" selected>{{ preset_time }}</option>{% endif %}
        </select>
      </div>
      <div class="col-md-4"><label class="form-label">نوع الموعد</label>
        <select id="visit_type" name="visit_type" class="form-select">
          <option value="first">أول زيارة</option>
          <option value="follow_up">متابعة</option>
          <option value="telemedicine">تطبيب عن بُعد</option>
        </select>
      </div>
      <div class="col-12">
        <button type="button" class="btn btn-outline-primary" onclick="loadSmartSlots()">اقتراح وقت ذكي</button>
        <span id="smartSlotsHint" class="text-muted ms-2"></span>
      </div>
      <div class="col-12"><label class="form-label">ملاحظات</label><textarea name="notes" class="form-control" rows="3"></textarea></div>
    </div>
    <div class="mt-3 d-flex gap-2"><button class="btn btn-primary" type="submit">حفظ</button><a class="btn btn-secondary" href="{{ url_for('booking.index') }}">رجوع</a></div>
  </form>
</div>
<script>
const presetDoctorId = {{ preset_doctor_id or 'null' }};
const presetTime = {{ (preset_time|tojson) if preset_time else 'null' }};

function loadDoctors(){
  const dept = document.getElementById('department_id').value;
  const url = '{{ url_for('booking.api_available_doctors') }}' + (dept ? ('?department_id='+dept) : '');
  fetch(url).then(r=>r.json()).then(d=>{
    const sel = document.getElementById('doctor_id');
    const current = sel.value || (presetDoctorId ? String(presetDoctorId) : '');
    sel.innerHTML = '<option value="">اختر الطبيب</option>';
    (d.doctors||[]).forEach(x=>{
      const o=document.createElement('option');
      o.value=x.id;
      o.textContent=x.full_name;
      if (current && String(x.id) === String(current)) o.selected = true;
      sel.appendChild(o);
    });
    loadTimes();
  });
}

function loadTimes(){
  const doc = document.getElementById('doctor_id').value;
  const dt = document.getElementById('appointment_date').value;
  const sel = document.getElementById('appointment_time');
  if(!doc || !dt){
    if (!sel.value) sel.innerHTML = '<option value="">اختر الوقت</option>';
    return;
  }
  const url = '{{ url_for('booking.api_available_times') }}' + `?doctor_id=${doc}&date=${dt}`;
  fetch(url).then(r=>r.json()).then(d=>{
    const current = sel.value || presetTime || '';
    sel.innerHTML = '<option value="">اختر الوقت</option>';
    (d.available_times||[]).forEach(t=>{
      const o=document.createElement('option');
      o.value=t;
      o.textContent=t;
      if (current && String(t) === String(current)) o.selected = true;
      sel.appendChild(o);
    });
  });
}

function loadSmartSlots(){
  const doc = document.getElementById('doctor_id').value;
  const dt = document.getElementById('appointment_date').value;
  const hint = document.getElementById('smartSlotsHint');
  if(!doc || !dt){
    if (hint) hint.textContent = 'اختر الطبيب والتاريخ أولاً';
    return;
  }
  const url = '{{ url_for('booking.api_smart_slots') }}' + `?doctor_id=${doc}&date=${dt}`;
  fetch(url).then(r=>r.json()).then(d=>{
    const list = d.suggested_times || [];
    if (hint) hint.textContent = list.length ? ('الأوقات المقترحة: ' + list.join('، ')) : 'لا توجد أوقات مقترحة';
    if (list.length) {
      const sel = document.getElementById('appointment_time');
      const current = sel.value;
      if (!current) {
        sel.value = list[0];
      }
    }
  });
}

document.addEventListener('DOMContentLoaded', () => {
  const dept = document.getElementById('department_id');
  if (dept && dept.value) {
    loadDoctors();
  }
});
</script>
{% endblock %}
