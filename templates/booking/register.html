{% extends "base.html" %}

{% block title %}إنشاء حساب للحجز{% endblock %}

{% block content %}
<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
              <h4 class="mb-1 text-primary">إنشاء حساب للحجز</h4>
              <div class="text-muted">حساب بسيط لمتابعة حجوزاتك</div>
            </div>
            <a class="btn btn-outline-secondary" href="{{ url_for('booking.index') }}">رجوع</a>
          </div>

          <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
              <label class="form-label">الاسم الكامل</label>
              <input type="text" class="form-control" name="full_name" required>
            </div>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">رقم الهاتف</label>
                <input type="text" class="form-control" name="phone" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">البريد الإلكتروني (اختياري)</label>
                <input type="email" class="form-control" name="email">
              </div>
            </div>
            <div class="row g-3 mt-1">
              <div class="col-md-6">
                <label class="form-label">الرقم الوطني (اختياري)</label>
                <input type="text" class="form-control" name="national_id">
              </div>
              <div class="col-md-6">
                <label class="form-label">كلمة المرور</label>
                <input type="password" class="form-control" name="password" required>
              </div>
            </div>
            <div class="d-flex gap-2 mt-4">
              <button type="submit" class="btn btn-primary">إنشاء الحساب</button>
              <a class="btn btn-outline-primary" href="{{ url_for('auth.login') }}">تسجيل الدخول</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
