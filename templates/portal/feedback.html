{% extends "portal/base.html" %}
{% block title %}التقييم{% endblock %}
{% block content %}
<div class="portal-card p-4 mx-auto portal-card-centered">
  <h4 class="mb-3">تقييم الخدمة</h4>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
      <label class="form-label" for="rating">التقييم (1-5)</label>
      <select class="form-select" name="rating" id="rating" required title="اختر التقييم">
        <option value="">اختر</option>
        <option value="5">5 — ممتاز</option>
        <option value="4">4 — جيد جداً</option>
        <option value="3">3 — جيد</option>
        <option value="2">2 — مقبول</option>
        <option value="1">1 — ضعيف</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label" for="comments">ملاحظات</label>
      <textarea class="form-control" name="comments" id="comments" rows="3" placeholder="ملاحظاتك"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">إرسال التقييم</button>
  </form>
</div>
{% endblock %}
