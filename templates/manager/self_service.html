{% extends "base.html" %}
{% block title %}تحليلات ذاتية الخدمة{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="row mb-4">
    <div class="col-12">
      <div class="card border-0 shadow-sm">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <h2 class="mb-1 text-primary"><i class="fas fa-filter me-2"></i>تحليلات ذاتية الخدمة</h2>
            <div class="text-muted">اختر نوع التقرير والفترة</div>
          </div>
          <a class="btn btn-secondary" href="{{ url_for('manager.dashboard') }}">العودة</a>
        </div>
      </div>
    </div>
  </div>

  <form class="row g-3 mb-3">
    <div class="col-md-3">
      <label class="form-label">النوع</label>
      <select class="form-select" name="type">
        <option value="patients" {% if report_type == 'patients' %}selected{% endif %}>المرضى</option>
        <option value="visits" {% if report_type == 'visits' %}selected{% endif %}>الزيارات</option>
        <option value="financial" {% if report_type == 'financial' %}selected{% endif %}>المالية</option>
        <option value="departments" {% if report_type == 'departments' %}selected{% endif %}>الأقسام</option>
      </select>
    </div>
    <div class="col-md-3">
      <label class="form-label">من</label>
      <input type="date" class="form-control" name="start_date" value="{{ start_date }}">
    </div>
    <div class="col-md-3">
      <label class="form-label">إلى</label>
      <input type="date" class="form-control" name="end_date" value="{{ end_date }}">
    </div>
    <div class="col-md-3 d-flex align-items-end">
      <button class="btn btn-primary w-100" type="submit">عرض</button>
    </div>
  </form>

  <div class="card shadow-sm">
    <div class="card-body">
      <pre class="mb-0">{{ data | tojson }}</pre>
    </div>
  </div>
</div>
{% endblock %}
