{% extends "base.html" %}

{% block title %}طلبات المختبر{% endblock %}

{% block content %}
<div class="container-fluid">
    <!-- Header -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-8">
                            <h2 class="mb-1 text-primary">
                                <i class="fas fa-flask me-2"></i>
                                طلبات المختبر
                            </h2>
                            <p class="text-muted mb-0">إدارة طلبات التحاليل</p>
                        </div>
                        <div class="col-md-4 text-end">
                            <div class="d-flex gap-2">
                                <a href="{{ url_for('doctor.dashboard') }}" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left me-1"></i>
                                    العودة للوحة التحكم
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Lab Requests List -->
    <div class="row">
        <div class="col-12">
            <div class="card shadow">
                <div class="card-header py-3">
                    <h6 class="m-0 fw-bold text-primary">طلبات التحاليل</h6>
                </div>
                <div class="card-body">
                    <div class="text-center py-5">
                        <i class="fas fa-flask fa-3x text-muted mb-3"></i>
                        <h5 class="text-muted">لا توجد طلبات تحاليل</h5>
                        <p class="text-muted">ستظهر طلبات التحاليل هنا عند إنشائها</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
