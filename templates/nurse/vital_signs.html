{% extends "base.html" %}

{% block title %}العلامات الحيوية{% endblock %}

{% block content %}
<div class="container-fluid">
    <!-- Header -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-8">
                            <h2 class="mb-1 text-primary">
                                <i class="fas fa-heartbeat me-2"></i>
                                العلامات الحيوية
                            </h2>
                            <p class="text-muted mb-0">مرحباً {{ current_user.full_name }}</p>
                        </div>
                        <div class="col-md-4 text-end">
                            <div class="d-flex gap-2">
                                <a href="{{ url_for('nurse.dashboard') }}" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left me-1"></i>
                                    العودة للوحة التحكم
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Vital Signs -->
    <div class="row">
        <div class="col-12">
            <div class="card shadow">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold text-primary">العلامات الحيوية</h6>
                </div>
                <div class="card-body">
                    <div class="text-center py-5">
                        <i class="fas fa-heartbeat fa-3x text-muted mb-3"></i>
                        <h5 class="text-muted">لا توجد علامات حيوية مسجلة</h5>
                        <p class="text-muted">ستظهر العلامات الحيوية هنا عند تسجيلها</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
