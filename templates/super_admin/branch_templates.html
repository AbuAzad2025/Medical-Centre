{% extends "base.html" %}
{% block title %}قوالب الفروع{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="row mb-4">
    <div class="col-12">
      <div class="card border-0 shadow-sm">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <h2 class="mb-1 text-primary"><i class="fas fa-code-branch me-2"></i>قوالب إعدادات الفروع</h2>
            <div class="text-muted">تجميع قوالب جاهزة لتطبيقها على الفروع</div>
          </div>
          <a class="btn btn-secondary" href="{{ url_for('super_admin.dashboard') }}">العودة</a>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <label class="form-label">القوالب (JSON)</label>
      <textarea id="templatesJson" class="form-control" rows="10">{{ items | tojson }}</textarea>
      <button class="btn btn-primary mt-3" id="saveTemplates">حفظ القوالب</button>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
        window.__M = window.__M || [];
        __M0__='{{ url_for("super_admin.branch_templates") }}';
        </script>
<script src="{{ url_for('static', filename='js/pages/super_admin/branch_templates.js') }}"></script>
{% endblock %}
