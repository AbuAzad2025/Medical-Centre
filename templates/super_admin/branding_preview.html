<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاينة ترويسة — {{ doc_type_label }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 1rem; background: #f8fafc; font-family: 'Cairo', sans-serif; }
        .preview-frame { background: #fff; padding: 1rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; max-width: 800px; margin: 0 auto; }
        .doc-badge { font-size: 0.75rem; color: #64748b; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <div class="preview-frame">
        <div class="doc-badge">معاينة: {{ doc_type_label }}</div>
        {% include 'print/_print_header_slot.html' %}
        {% if print_footer_html %}
        <div style="margin-top:1rem;padding-top:0.5rem;border-top:1px solid #e2e8f0;font-size:0.8rem;color:#64748b;">
            {{ print_footer_html|safe }}
        </div>
        {% endif %}
    </div>
</body>
</html>
