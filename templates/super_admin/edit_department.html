{% extends "base.html" %}

{% block title %}تعديل القسم - {{ department.name }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <div class="card border-0 shadow-lg glass-effect">
                <div class="card-header" style="background: var(--warning-gradient); color: white;">
                    <h4 class="mb-0">
                        <i class="fas fa-edit me-2"></i>
                        تعديل القسم: {{ department.name }}
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="name" class="form-label">
                                    <i class="fas fa-tag text-primary me-2"></i>
                                    اسم القسم *
                                </label>
                                <input type="text" class="form-control" id="name" name="name" 
                                       value="{{ department.name }}" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="name_en" class="form-label">
                                    <i class="fas fa-globe text-info me-2"></i>
                                    الاسم بالإنجليزية
                                </label>
                                <input type="text" class="form-control" id="name_en" name="name_en" 
                                       value="{{ department.name_en or '' }}">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label for="description" class="form-label">
                                    <i class="fas fa-align-right text-success me-2"></i>
                                    الوصف
                                </label>
                                <textarea class="form-control" id="description" name="description" 
                                          rows="3">{{ department.description or '' }}</textarea>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="location" class="form-label">
                                    <i class="fas fa-map-marker-alt text-danger me-2"></i>
                                    الموقع
                                </label>
                                <input type="text" class="form-control" id="location" name="location" 
                                       value="{{ department.location or '' }}">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="phone" class="form-label">
                                    <i class="fas fa-phone text-success me-2"></i>
                                    الهاتف
                                </label>
                                <input type="text" class="form-control" id="phone" name="phone" 
                                       value="{{ department.phone or '' }}">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    <i class="fas fa-toggle-on text-info me-2"></i>
                                    الحالة
                                </label>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="is_active" name="is_active" 
                                           {% if department.is_active %}checked{% endif %}>
                                    <label class="form-check-label" for="is_active">نشط</label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row mt-4">
                            <div class="col-12">
                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-warning btn-lg">
                                        <i class="fas fa-save me-2"></i>
                                        حفظ التغييرات
                                    </button>
                                    <a href="{{ url_for('super_admin.view_department', department_id=department.id) }}" class="btn btn-info btn-lg">
                                        <i class="fas fa-eye me-2"></i>
                                        عرض التفاصيل
                                    </a>
                                    <a href="{{ url_for('super_admin.departments') }}" class="btn btn-secondary btn-lg">
                                        <i class="fas fa-times me-2"></i>
                                        إلغاء
                                    </a>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
