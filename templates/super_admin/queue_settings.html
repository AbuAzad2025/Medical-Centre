{% extends "base.html" %}
{% block title %}إعدادات الطوابير{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="row mb-4">
    <div class="col-12">
      <div class="card border-0 shadow-sm">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <h2 class="mb-1 text-primary"><i class="fas fa-stream me-2"></i>إعدادات الطوابير</h2>
            <div class="text-muted">ضبط إعدادات الطابور حسب القسم</div>
          </div>
          <div class="d-flex gap-2">
            <a class="btn btn-secondary" href="{{ url_for('super_admin.dashboard') }}"><i class="fas fa-arrow-left me-1"></i>العودة</a>
            <button class="btn btn-primary" id="saveQueueSettingsBtn"><i class="fas fa-save me-1"></i>حفظ</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow">
    <div class="card-header">الأقسام</div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-striped align-middle mb-0" id="queueSettingsTable">
          <thead class="bg-light">
            <tr>
              <th class="ps-3">القسم</th>
              <th style="width: 140px;">أقصى حجم</th>
              <th style="width: 140px;">دفع مطلوب</th>
              <th style="width: 170px;">إعفاء طوارئ</th>
              <th style="width: 170px;">دخول قسري</th>
              <th style="width: 170px;">متوسط انتظار</th>
              <th style="width: 170px;">دفع جزئي</th>
              <th style="width: 140px;">دين</th>
            </tr>
          </thead>
          <tbody id="queueSettingsBody">
            <tr><td colspan="8" class="text-center text-muted py-4">جاري التحميل...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
        window.__M = window.__M || [];
        __M0__={{ url_for('super_admin.queue_settings') }}; __M1__={{ url_for('super_admin.queue_settings') }};
        </script>
<script src="{{ url_for('static', filename='js/pages/super_admin/queue_settings.js') }}"></script>
{% endblock %}
