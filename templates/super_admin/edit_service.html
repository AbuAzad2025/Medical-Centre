{% extends "base.html" %}

{% block title %}تعديل الخدمة - {{ service.name }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <div class="card border-0 shadow-lg glass-effect">
                <div class="card-header" style="background: var(--warning-gradient); color: white;">
                    <h4 class="mb-0">
                        <i class="fas fa-edit me-2"></i>
                        تعديل الخدمة: {{ service.name }}
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('super_admin.edit_service', service_id=service.id) }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="name" class="form-label">
                                    <i class="fas fa-tag text-primary me-2"></i>
                                    اسم الخدمة *
                                </label>
                                <input type="text" class="form-control" id="name" name="name" 
                                       value="{{ service.name }}" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="name_en" class="form-label">
                                    <i class="fas fa-globe text-info me-2"></i>
                                    الاسم بالإنجليزية
                                </label>
                                <input type="text" class="form-control" id="name_en" name="name_en" 
                                       value="{{ service.name_en or '' }}">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label for="description" class="form-label">
                                    <i class="fas fa-align-right text-success me-2"></i>
                                    الوصف
                                </label>
                                <textarea class="form-control" id="description" name="description" 
                                          rows="4">{{ service.description or '' }}</textarea>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="base_price" class="form-label">
                                    <i class="fas fa-dollar-sign text-success me-2"></i>
                                    السعر الأساسي *
                                </label>
                                <input type="number" class="form-control" id="base_price" name="base_price" 
                                       value="{{ service.base_price or 0 }}" step="0.01" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    <i class="fas fa-toggle-on text-info me-2"></i>
                                    الحالة
                                </label>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="is_active" name="is_active" 
                                           {% if service.is_active %}checked{% endif %}>
                                    <label class="form-check-label" for="is_active">
                                        نشط
                                    </label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row mt-4">
                            <div class="col-12">
                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-warning btn-lg">
                                        <i class="fas fa-save me-2"></i>
                                        حفظ التغييرات
                                    </button>
                                    <a href="{{ url_for('super_admin.view_service', service_id=service.id) }}" class="btn btn-info btn-lg">
                                        <i class="fas fa-eye me-2"></i>
                                        عرض التفاصيل
                                    </a>
                                    <a href="{{ url_for('super_admin.services') }}" class="btn btn-secondary btn-lg">
                                        <i class="fas fa-times me-2"></i>
                                        إلغاء
                                    </a>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
