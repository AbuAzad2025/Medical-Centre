{% extends "base.html" %}

{% block title %}إضافة مريض جديد - الاستقبال{% endblock %}

{% block content %}
<div class="container-fluid">
    <!-- Header -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-8">
                            <h2 class="mb-1 text-primary">
                                <i class="fas fa-user-plus me-2"></i>
                                إضافة مريض جديد
                            </h2>
                            <p class="text-muted mb-0">تسجيل مريض جديد في النظام</p>
                        </div>
                        <div class="col-md-4 text-end">
                            <div class="d-flex gap-2">
                                <button class="btn btn-secondary" onclick="history.back()">
                                    <i class="fas fa-arrow-right me-1"></i>
                                    رجوع
                                </button>
                                <button class="btn btn-primary" onclick="savePatient()">
                                    <i class="fas fa-save me-1"></i>
                                    حفظ المريض
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Patient Form -->
    <div class="row">
        <div class="col-12">
            <div class="card shadow">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold text-primary">معلومات المريض</h6>
                </div>
                <div class="card-body">
                    <form id="patientForm" method="POST" action="{{ url_for('reception.add_patient') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        
                        <!-- Personal Information -->
                        <div class="row mb-4">
                            <div class="col-12">
                                <h6 class="text-primary mb-3">المعلومات الشخصية</h6>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="national_id" class="form-label">رقم الهوية الوطنية</label>
                                    <input type="text" class="form-control" id="national_id" name="national_id" 
                                           placeholder="أدخل رقم الهوية الوطنية">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="phone" class="form-label">رقم الهاتف</label>
                                    <input type="tel" class="form-control" id="phone" name="phone" 
                                           placeholder="أدخل رقم الهاتف" required>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-3">
                                <div class="mb-3">
                                    <label for="first_name" class="form-label">الاسم الأول (عربي)</label>
                                    <input type="text" class="form-control" id="first_name" name="first_name" 
                                           placeholder="أدخل الاسم الأول" required>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="mb-3">
                                    <label for="last_name" class="form-label">اسم العائلة (عربي)</label>
                                    <input type="text" class="form-control" id="last_name" name="last_name" 
                                           placeholder="أدخل اسم العائلة" required>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="mb-3">
                                    <label for="first_name_ar" class="form-label">الاسم الأول (إنجليزي)</label>
                                    <input type="text" class="form-control" id="first_name_ar" name="first_name_ar" 
                                           placeholder="Enter first name">
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="mb-3">
                                    <label for="last_name_ar" class="form-label">اسم العائلة (إنجليزي)</label>
                                    <input type="text" class="form-control" id="last_name_ar" name="last_name_ar" 
                                           placeholder="Enter last name">
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="birth_date" class="form-label">تاريخ الميلاد</label>
                                    <input type="date" class="form-control" id="birth_date" name="birth_date">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="gender" class="form-label">الجنس</label>
                                    <select class="form-control" id="gender" name="gender">
                                        <option value="">اختر الجنس</option>
                                        <option value="M">ذكر</option>
                                        <option value="F">أنثى</option>
                                        <option value="Other">آخر</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="age" class="form-label">العمر (سنوات)</label>
                                    <input type="number" class="form-control" id="age" name="age" 
                                           placeholder="العمر" readonly>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-12">
                                <div class="mb-3">
                                    <label for="address" class="form-label">العنوان</label>
                                    <textarea class="form-control" id="address" name="address" 
                                              rows="3" placeholder="أدخل العنوان الكامل"></textarea>
                                </div>
                            </div>
                        </div>

                        <!-- Medical Information -->
                        <div class="row mb-4">
                            <div class="col-12">
                                <h6 class="text-primary mb-3">المعلومات الطبية</h6>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="blood_type" class="form-label">فصيلة الدم</label>
                                    <select class="form-control" id="blood_type" name="blood_type">
                                        <option value="">اختر فصيلة الدم</option>
                                        <option value="A+">A+</option>
                                        <option value="A-">A-</option>
                                        <option value="B+">B+</option>
                                        <option value="B-">B-</option>
                                        <option value="AB+">AB+</option>
                                        <option value="AB-">AB-</option>
                                        <option value="O+">O+</option>
                                        <option value="O-">O-</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="allergies" class="form-label">الحساسيات</label>
                                    <input type="text" class="form-control" id="allergies" name="allergies" 
                                           placeholder="أدخل الحساسيات إن وجدت">
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-12">
                                <div class="mb-3">
                                    <label for="medical_history" class="form-label">التاريخ الطبي</label>
                                    <textarea class="form-control" id="medical_history" name="medical_history" 
                                              rows="3" placeholder="أدخل التاريخ الطبي للمريض"></textarea>
                                </div>
                            </div>
                        </div>

                        <!-- Emergency Contact -->
                        <div class="row mb-4">
                            <div class="col-12">
                                <h6 class="text-primary mb-3">جهة الاتصال في حالات الطوارئ</h6>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="emergency_contact_name" class="form-label">اسم جهة الاتصال</label>
                                    <input type="text" class="form-control" id="emergency_contact_name" name="emergency_contact_name" 
                                           placeholder="أدخل اسم جهة الاتصال">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="emergency_contact_phone" class="form-label">رقم هاتف جهة الاتصال</label>
                                    <input type="tel" class="form-control" id="emergency_contact_phone" name="emergency_contact_phone" 
                                           placeholder="أدخل رقم هاتف جهة الاتصال">
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-12">
                                <div class="mb-3">
                                    <label for="emergency_contact_relation" class="form-label">صلة القرابة</label>
                                    <select class="form-control" id="emergency_contact_relation" name="emergency_contact_relation">
                                        <option value="">اختر صلة القرابة</option>
                                        <option value="parent">والد/والدة</option>
                                        <option value="spouse">زوج/زوجة</option>
                                        <option value="sibling">أخ/أخت</option>
                                        <option value="child">ابن/ابنة</option>
                                        <option value="friend">صديق/صديقة</option>
                                        <option value="other">آخر</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Notes -->
                        <div class="row mb-4">
                            <div class="col-12">
                                <h6 class="text-primary mb-3">ملاحظات إضافية</h6>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-12">
                                <div class="mb-3">
                                    <label for="notes" class="form-label">ملاحظات</label>
                                    <textarea class="form-control" id="notes" name="notes" 
                                              rows="4" placeholder="أدخل أي ملاحظات إضافية"></textarea>
                                </div>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <div class="row mt-4">
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-2"></i>
                                    حفظ المريض
                                </button>
                                <button type="button" class="btn btn-secondary" onclick="resetForm()">
                                    <i class="fas fa-undo me-2"></i>
                                    إعادة تعيين
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.form-label {
    font-weight: 600;
    color: #5a5c69;
}

.form-control:focus {
    border-color: #4e73df;
    box-shadow: 0 0 0 0.2rem rgba(78, 115, 223, 0.25);
}

.card {
    border: 1px solid #e3e6f0;
    border-radius: 0.35rem;
}

.card-header {
    background-color: #f8f9fc;
    border-bottom: 1px solid #e3e6f0;
}

.btn {
    border-radius: 0.35rem;
}

.btn-primary {
    background-color: #4e73df;
    border-color: #4e73df;
}

.btn-primary:hover {
    background-color: #2e59d9;
    border-color: #2e59d9;
}
</style>

<script>
function savePatient() {
    // حفظ المريض
    const form = document.getElementById('patientForm');
    const formData = new FormData(form);
    
    // التحقق من صحة البيانات
    if (!formData.get('first_name') || !formData.get('last_name') || !formData.get('phone')) {
        alert('يرجى ملء جميع الحقول المطلوبة');
        return;
    }
    
    // إرسال البيانات
    fetch('{{ url_for("reception.add_patient") }}', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert('تم حفظ المريض بنجاح');
            location.href = '{{ url_for("reception.patients") }}';
        } else {
            alert('حدث خطأ في حفظ المريض: ' + data.message);
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('حدث خطأ في حفظ المريض');
    });
}

function resetForm() {
    // إعادة تعيين النموذج
    if (confirm('هل تريد إعادة تعيين النموذج؟')) {
        document.getElementById('patientForm').reset();
    }
}

// حساب العمر تلقائياً
document.getElementById('birth_date').addEventListener('change', function() {
    const birthDate = new Date(this.value);
    const today = new Date();
    const age = today.getFullYear() - birthDate.getFullYear();
    const monthDiff = today.getMonth() - birthDate.getMonth();
    
    if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
        age--;
    }
    
    document.getElementById('age').value = age;
});

// التحقق من صحة رقم الهاتف
document.getElementById('phone').addEventListener('input', function() {
    const phone = this.value;
    const phoneRegex = /^[0-9+\-\s()]+$/;
    
    if (phone && !phoneRegex.test(phone)) {
        this.setCustomValidity('رقم الهاتف غير صحيح');
    } else {
        this.setCustomValidity('');
    }
});

// التحقق من صحة رقم الهوية
document.getElementById('national_id').addEventListener('input', function() {
    const nationalId = this.value;
    const nationalIdRegex = /^[0-9]{9}$/;
    
    if (nationalId && !nationalIdRegex.test(nationalId)) {
        this.setCustomValidity('رقم الهوية يجب أن يكون 9 أرقام');
    } else {
        this.setCustomValidity('');
    }
});

// إضافة تأثيرات تفاعلية
document.addEventListener('DOMContentLoaded', function() {
    // إضافة تأثير focus للحقول
    const inputs = document.querySelectorAll('.form-control');
    inputs.forEach(input => {
        input.addEventListener('focus', function() {
            this.parentElement.classList.add('focused');
        });
        input.addEventListener('blur', function() {
            this.parentElement.classList.remove('focused');
        });
    });
});
</script>
{% endblock %}
