<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة النداء</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        body { background: #0b1020; color: #f1f5f9; }
        .header { background: linear-gradient(135deg, #f59e0b, #ef4444); padding: 20px; border-radius: 16px; }
        .call-card { background: #111827; border: 1px solid #1f2937; }
        .queue-number { font-size: 3rem; font-weight: 800; }
    </style>
</head>
<body class="p-4">
    <div class="container-fluid">
        <div class="header mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="mb-1">شاشة النداء</h2>
                    <div id="live-clock"></div>
                </div>
                <div class="fs-5">يرجى التوجه للقسم عند النداء</div>
            </div>
        </div>

        <div class="row g-3" id="calls-grid"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const apiUrl = "{{ url_for('reception.api_display_calls') }}";
        const grid = document.getElementById('calls-grid');
        const clockEl = document.getElementById('live-clock');
        const queueSocket = io('/queue');

        function render(items) {
            grid.innerHTML = '';
            if (!items || items.length === 0) {
                const div = document.createElement('div');
                div.className = 'text-center text-muted';
                div.textContent = 'لا يوجد نداءات حالياً';
                grid.appendChild(div);
                return;
            }
            items.forEach(it => {
                const col = document.createElement('div');
                col.className = 'col-12 col-md-6 col-lg-4';
                col.innerHTML = `
                    <div class="call-card p-4 rounded">
                        <div class="queue-number text-warning">${it.queue_number || '-'}</div>
                        <div class="fs-5">${it.department_name || ''}</div>
                        <div class="text-muted">${it.doctor_name || ''}</div>
                        <div class="text-muted">${it.room_name ? 'غرفة ' + it.room_name : ''}</div>
                        <div class="text-muted">${it.status || ''}</div>
                    </div>
                `;
                grid.appendChild(col);
            });
        }

        function refresh() {
            fetch(apiUrl, { headers: { 'Accept': 'application/json' } })
                .then(r => r.json())
                .then(data => {
                    if (!data || !data.success) return;
                    render(data.items || []);
                })
                .catch(() => {});
        }

        function tickClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            clockEl.textContent = `${h}:${m}`;
        }

        tickClock();
        setInterval(tickClock, 60000);
        refresh();
        setInterval(refresh, 6000);

        queueSocket.on('queue_display_calls', function(data) {
            if (!data) return;
            render(data.items || []);
        });
    </script>
</body>
</html>
