{% extends "base.html" %}
{% block title %}إغلاق اليومية{% endblock %}
{% block content %}
<div class="container-fluid max-w-600">
    <div class="card shadow">
        <div class="card-header bg-danger text-white">
            <h5 class="mb-0"><i class="fas fa-lock me-2"></i>إغلاق اليومية — {{ register.register_date }}</h5>
        </div>
        <div class="card-body">
            <div class="alert alert-info">
                <strong>الإجمالي المتوقع:</strong> {{ "%.2f"|format(register.expected_total|float) }} ₪
            </div>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">النقدية الفعلية</label>
                    <input type="number" step="0.01" name="actual_cash" class="form-control" value="{{ register.expected_cash|float }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">البطاقة الفعلية</label>
                    <input type="number" step="0.01" name="actual_card" class="form-control" value="{{ register.expected_card|float }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">التأمين الفعلي</label>
                    <input type="number" step="0.01" name="actual_insurance" class="form-control" value="{{ register.expected_insurance|float }}" required>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger flex-fill" data-action="confirm" data-message="تأكيد إغلاق اليومية؟ لا يمكن التراجع.">
                        <i class="fas fa-lock me-1"></i> تأكيد الإغلاق
                    </button>
                    <a href="{{ url_for('reception.cash_register') }}" class="btn btn-outline-secondary">إلغاء</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
