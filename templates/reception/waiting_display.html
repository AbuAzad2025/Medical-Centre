<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <title>شاشة الانتظار</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
body { background: #0f172a; color: #f8fafc; }
        .header { background: linear-gradient(135deg, #0ea5e9, #2563eb); padding: 20px; border-radius: 16px; }
        .card-dark { background: #111827; border: 1px solid #1f2937; }
        .queue-number { font-size: 2rem; font-weight: 700; }

</style>

<body class="p-4">

                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card card-dark h-100">
                    <div class="card-body">
                        <h5 class="mb-3">تم الاستدعاء</h5>
                        <div id="called-list" class="d-grid gap-2"></div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card card-dark h-100">
                    <div class="card-body">
                        <h5 class="mb-3">قائمة الانتظار</h5>
                        <div id="waiting-list" class="d-grid gap-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
