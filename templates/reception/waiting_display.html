<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f4c81">
    <title>شاشة الانتظار</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-tokens.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/clinical.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/motion.css') }}">
    <style id="tenant-branding-vars">
    :root {
      --color-primary: {{ ui.primary_color if ui else '#0f4c81' }};
      --kiosk-bg: #0f172a;
      --kiosk-fg: #f8fafc;
    }
    </style>
    <style>
body { background: var(--kiosk-bg); color: var(--kiosk-fg); }
        .header { background: linear-gradient(135deg, var(--color-primary), color-mix(in srgb, var(--color-primary) 70%, #000)); padding: 20px; border-radius: 16px; }
        .card-dark { background: #111827; border: 1px solid #1f2937; }
        .queue-number { font-size: 2rem; font-weight: 700; }
</style>
</head>
<body class="p-4" data-kiosk="true" data-touch="coarse">
    <div class="container-fluid">
        <div class="header mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="mb-1">شاشة الانتظار</h2>
                    <div id="live-clock"></div>
                </div>
                <div class="fs-5">يرجى متابعة رقم الدور</div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card card-dark h-100">
                    <div class="card-body">
                        <h5 class="mb-3">يتم الآن</h5>
                        <div id="current-list" class="d-grid gap-2"></div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card card-dark h-100">
                    <div class="card-body">
                        <h5 class="mb-3">تم الاستدعاء</h5>
                        <div id="called-list" class="d-grid gap-2"></div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card card-dark h-100">
                    <div class="card-body">
                        <h5 class="mb-3">قائمة الانتظار</h5>
                        <div id="waiting-list" class="d-grid gap-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        window.__M = window.__M || [];
        __M0__='{{ url_for('reception.api_display_waiting') }}';
        </script>
<script src="{{ url_for('static', filename='js/pages/reception/waiting_display.js') }}"></script>
</body>
</html>
