<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة الانتظار</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #f8fafc; }
        .header { background: linear-gradient(135deg, #0ea5e9, #2563eb); padding: 20px; border-radius: 16px; }
        .card-dark { background: #111827; border: 1px solid #1f2937; }
        .queue-number { font-size: 2rem; font-weight: 700; }
        .ticker { font-size: 1.1rem; }
    </style>
</head>
<body class="p-4">
    <div class="container-fluid">
        <div class="header mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="mb-1">شاشة الانتظار</h2>
                    <div id="live-clock"></div>
                </div>
                <div class="fs-5">يرجى متابعة رقم الدور</div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card card-dark h-100">
                    <div class="card-body">
                        <h5 class="mb-3">يتم الآن</h5>
                        <div id="current-list" class="d-grid gap-2"></div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card card-dark h-100">
                    <div class="card-body">
                        <h5 class="mb-3">تم الاستدعاء</h5>
                        <div id="called-list" class="d-grid gap-2"></div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card card-dark h-100">
                    <div class="card-body">
                        <h5 class="mb-3">قائمة الانتظار</h5>
                        <div id="waiting-list" class="d-grid gap-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const apiUrl = "{{ url_for('reception.api_display_waiting') }}";
        const clockEl = document.getElementById('live-clock');
        const queueSocket = io('/queue');

        function renderList(el, items, emptyText) {
            el.innerHTML = '';
            if (!items || items.length === 0) {
                const div = document.createElement('div');
                div.className = 'text-muted';
                div.textContent = emptyText;
                el.appendChild(div);
                return;
            }
            items.forEach(it => {
                const card = document.createElement('div');
                card.className = 'p-3 rounded bg-dark-subtle text-dark';
                card.innerHTML = `
                    <div class="queue-number">${it.queue_number || '-'}</div>
                    <div class="ticker">${it.department_name || ''}</div>
                    <div class="text-muted">${it.doctor_name || ''}</div>
                    <div class="text-muted">${it.room_name ? 'غرفة ' + it.room_name : ''}</div>
                `;
                el.appendChild(card);
            });
        }

        function refresh() {
            fetch(apiUrl, { headers: { 'Accept': 'application/json' } })
                .then(r => r.json())
                .then(data => {
                    if (!data || !data.success) return;
                    renderList(document.getElementById('current-list'), data.current, 'لا يوجد');
                    renderList(document.getElementById('called-list'), data.called, 'لا يوجد');
                    renderList(document.getElementById('waiting-list'), data.waiting, 'لا يوجد');
                })
                .catch(() => {});
        }

        function tickClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            clockEl.textContent = `${h}:${m}`;
        }

        tickClock();
        setInterval(tickClock, 60000);
        refresh();
        setInterval(refresh, 8000);

        queueSocket.on('queue_display_waiting', function(data) {
            if (!data) return;
            renderList(document.getElementById('current-list'), data.current, 'لا يوجد');
            renderList(document.getElementById('called-list'), data.called, 'لا يوجد');
            renderList(document.getElementById('waiting-list'), data.waiting, 'لا يوجد');
        });
    </script>
</body>
</html>
