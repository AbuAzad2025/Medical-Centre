<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="{{ ui.primary_color if ui else '#0f4c81' }}">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>{% block title %}كشك{% endblock %} — {{ ui.organization_name if ui else 'AZAD Medical' }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/design-tokens.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/clinical.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/touch.css') }}">
  <style id="tenant-branding-vars">
  :root {
    --color-primary: {{ ui.primary_color if ui else '#0f4c81' }};
    --color-secondary: {{ ui.secondary_color if ui else '#10b981' }};
  }
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/kiosk.css') }}">
  {% block extra_css %}{% endblock %}
</head>
<body class="clinical-theme kiosk-theme" data-kiosk="true" data-touch="coarse">
  <main class="kiosk-main">
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='js/touch-mode.js') }}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
