<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#1a1f3a">
    <link rel="manifest" href="{{ url_for('pwa.manifest') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/icon-192x192.png') }}">
    <title>{% block title %}لوحة المنصة — AZAD{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon/favicon.ico') }}">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-tokens.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/clinical.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/core.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/platform.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}">
    <style id="tenant-branding-vars">
    :root {
      --color-primary: {{ ui.primary_color if ui else '#1a1f3a' }};
      --color-secondary: {{ ui.secondary_color if ui else '#10b981' }};
      --color-accent: {{ ui.accent_color if ui else '#00a6a6' }};
      --brand-logo-url: url('{{ ui.logo_url if ui else url_for('static', filename='img/azad_logo.png') }}');
    }
    </style>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    {% block extra_css %}{% endblock %}
</head>
<body class="clinical-theme platform-theme">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    {% include 'partials/_owner_navbar.html' %}
    {% include 'partials/_flash.html' %}
    <div class="main-layout">
        {% include 'partials/_owner_sidebar.html' %}
        <main class="main-container" id="mainContent">
            {% block content %}{% endblock %}
        </main>
    </div>
    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='adminlte/plugins/sweetalert2/sweetalert2.all.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/base.js') }}"></script>
    <script src="{{ url_for('static', filename='js/events.js') }}"></script>
    <script>window.__VALIDATION_RULES__ = {{ validation_rules|default({})|tojson }};</script>
    <script src="{{ url_for('static', filename='js/form-validation.js') }}"></script>
    <script src="{{ url_for('static', filename='js/pwa-install.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
