{% extends "base.html" %}
{% block title %}إنشاء نسخة احتياطية{% endblock %}
{% block content %}
<div class="container">
  <h2 class="mb-4"><i class="fas fa-plus me-2"></i> إنشاء نسخة احتياطية</h2>
  <form method="post" action="{{ url_for('backup.create_backup') }}" class="card shadow-sm p-3">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
      <label class="form-label">اسم النسخة</label>
      <input name="backup_name" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">نوع النسخة</label>
      <select name="backup_type" class="form-select">
        <option value="full">كاملة</option>
        <option value="incremental">تفاضلية</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">الوصف</label>
      <textarea name="description" class="form-control" rows="3"></textarea>
    </div>
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="enc" name="is_encrypted">
      <label class="form-check-label" for="enc">تشفير النسخة</label>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit">إنشاء</button>
      <a class="btn btn-secondary" href="{{ url_for('backup.dashboard') }}">رجوع</a>
    </div>
  </form>
</div>
{% endblock %}
