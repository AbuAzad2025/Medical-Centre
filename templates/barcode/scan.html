{% extends "base.html" %}
{% block title %}مسح الباركود{% endblock %}
{% block content %}
<div class="container-fluid">
  <h2 class="mb-4">مسح الباركود / QR</h2>
  <div class="card p-4 mx-auto max-w-500">
    <div class="mb-3">
      <label class="form-label">أدخل الباركود</label>
      <input type="text" id="barcodeInput" class="form-control form-control-lg" placeholder="Scan barcode here..." autofocus>
    </div>
    <div class="mb-3">
      <label class="form-label">الإجراء</label>
      <select id="scanAction" class="form-select" title="اختر إجراء المسح">
        <option value="VERIFY">تحقق</option>
        <option value="ADMINISTER">إعطاء دواء</option>
        <option value="DISPENSE">صرف</option>
        <option value="COLLECT">جمع عينة</option>
      </select>
    </div>
    <button class="btn btn-primary btn-lg" onclick="submitScan()">تأكيد</button>
    <div id="scanResult" class="mt-3"></div>
  </div>
</div>
<script>
        window.__M = window.__M || [];
        __M0__='{{ url_for('barcode.api_scan') }}'; __M1__='{{ csrf_token() }}';
        </script>
<script src="{{ url_for('static', filename='js/pages/barcode/scan.js') }}"></script>
{% endblock %}
