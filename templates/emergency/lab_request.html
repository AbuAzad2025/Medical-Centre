{% extends "base.html" %}

{% block title %}طلب فحوصات - الطوارئ{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h2 class="mb-1 text-primary">طلب فحوصات للمريض</h2>
                        <p class="text-muted mb-0">{{ emergency.patient.full_name if emergency and emergency.patient else '' }}</p>
                    </div>
                    <div>
                        <a href="{{ url_for('emergency.patient_queue') }}" class="btn btn-secondary">رجوع</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card shadow">
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="row">
                            <div class="col-md-8">
                                <label class="form-label">الفحوصات المطلوبة</label>
                                <input type="text" class="form-control" name="tests" placeholder="أدخل أسماء الفحوصات">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">تعليمات خاصة</label>
                                <input type="text" class="form-control" name="instructions" placeholder="تعليمات للطبيب أو المختبر">
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary">إرسال الطلب</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
