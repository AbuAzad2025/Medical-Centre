name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      SECRET_KEY: ci-test-secret-key
      APP_ENV: testing
      FLASK_ENV: testing
      FLASK_APP: wsgi:app
      SUPPRESS_BACKGROUND_WORKER: "1"
      SUPPRESS_LOGGING: "1"
      MIGRATE_ADMIN_URL: postgresql://postgres:testpass@localhost:5432/postgres
      MIGRATE_DATABASE_URL: postgresql://postgres:testpass@localhost:5432/medical_migrate_ci
      DATABASE_URL: postgresql://postgres:testpass@localhost:5432/medical_migrate_ci

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Alembic upgrade (fresh DB)
        run: python scripts/verify_migrations.py

      - name: Bootstrap platform catalog
        run: python scripts/ops/bootstrap_platform.py
        env:
          FLASK_ENV: production
          ENABLE_SAAS_MODE: "true"

  test:
    runs-on: ubuntu-latest
    needs: migrate
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: medical_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      SECRET_KEY: ci-test-secret-key
      APP_ENV: testing
      FLASK_ENV: testing
      FLASK_APP: wsgi:app
      SUPPRESS_BACKGROUND_WORKER: "1"
      SUPPRESS_LOGGING: "1"
      TEST_DATABASE_URL: postgresql://postgres:testpass@localhost:5432/medical_test
      DATABASE_URL: postgresql://postgres:testpass@localhost:5432/medical_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_ENABLED: "true"
      CELERY_TASK_ALWAYS_EAGER: "true"
      ENABLE_SAAS_MODE: "true"
      STRIPE_SECRET_KEY: sk_test_ci_e2e
      STRIPE_WEBHOOK_SECRET: whsec_test_ci_e2e

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Install PostgreSQL client (pg_dump/psql for E2E backups)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Syntax lint (flake8 E9/F63/F7/F82)
        run: |
          python -m flake8 app routes services models utils tests scripts --count --select=E9,F63,F7,F82 --statistics

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -q --tb=short \
            --cov=app --cov=routes --cov=services --cov=models --cov=utils \
            --cov-report=term-missing:skip-covered \
            --cov-report=json:coverage.json

      - name: Coverage summary
        run: |
          python - <<'PY'
          import json
          from collections import defaultdict
          data = json.load(open("coverage.json"))
          totals = data["totals"]
          print(f"TOTAL: {totals['percent_covered']:.1f}% "
                f"({totals['covered_lines']}/{totals['num_statements']} lines)")
          by_pkg = defaultdict(lambda: {"covered": 0, "total": 0})
          for path, entry in data["files"].items():
              parts = path.replace("\\", "/").split("/")
              pkg = parts[0] if parts else "other"
              by_pkg[pkg]["covered"] += entry["summary"]["covered_lines"]
              by_pkg[pkg]["total"] += entry["summary"]["num_statements"]
          for pkg in sorted(by_pkg):
              c, t = by_pkg[pkg]["covered"], by_pkg[pkg]["total"]
              pct = (100.0 * c / t) if t else 0
              print(f"  {pkg}: {pct:.1f}% ({c}/{t})")
          PY
