version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-changeme}
      POSTGRES_DB: ${PG_DB_NAME:-medical_system}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DB_NAME:-medical_system}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASSWORD:-changeme}@db:5432/${PG_DB_NAME:-medical_system}
      FLASK_ENV: production
      HOST: 0.0.0.0
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads:/app/static/uploads

volumes:
  pgdata:
  uploads:
